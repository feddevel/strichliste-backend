parameters:
    # Adds a fallback DATABASE_URL if the env var is not set.
    # This allows you to run cache:warmup even if your
    # environment variables are not available yet.
    # You should not need to change this value.
    env(DATABASE_URL): ''

doctrine:
    dbal:
        # Configure the database connection through DATABASE_URL.
        # SQLite is the default in .env.dist for lightweight local development.
        # For MySQL, include serverVersion and charset in the URL, for example:
        # mysql://user:password@127.0.0.1:3306/dbname?serverVersion=8.0.36&charset=utf8mb4
        url: '%env(resolve:DATABASE_URL)%'
    orm:
        auto_generate_proxy_classes: '%kernel.debug%'
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: true
        dql:
            datetime_functions:
                date: App\Doctrine\Functions\Date
                iif: App\Doctrine\Functions\Iif
        mappings:
            App:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
